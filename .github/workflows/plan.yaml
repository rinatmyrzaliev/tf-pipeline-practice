name: Terraform Plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write        # required for OIDC
  contents: read         # read the repo code
  pull-requests: write   # post the plan as a PR comment

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::517121893325:role/gha-tf-pipeline-practice
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan -no-color -out=tfplan
          echo '### Terraform Plan' > plan.md
          echo '```' >> plan.md
          terraform show -no-color tfplan >> plan.md
          echo '```' >> plan.md

      - name: Post plan to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file plan.md